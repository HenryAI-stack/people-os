name: Deploy PeopleOS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build
        env:
          VITE_FIREBASE_API_KEY:     ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:  ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_ALLOWED_EMAIL:        ${{ secrets.VITE_ALLOWED_EMAIL }}
          VITE_GITHUB_OWNER:         ${{ secrets.VITE_GITHUB_OWNER }}
          VITE_GITHUB_REPO:          ${{ secrets.VITE_GITHUB_REPO }}
          VITE_GITHUB_TOKEN:         ${{ secrets.VITE_GITHUB_TOKEN }}
          VITE_GITHUB_BRANCH:        ${{ secrets.VITE_GITHUB_BRANCH }}
          VITE_ENCRYPTION_SECRET:    ${{ secrets.VITE_ENCRYPTION_SECRET }}
          VITE_OPENROUTER_API_KEY:   ${{ secrets.VITE_OPENROUTER_API_KEY }}
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
